<main class="app-shell">
  <nav class="app-nav">
    <div class="app-nav__brand">Cesizen</div>
    <div class="app-nav__links">
      <a routerLink="/acceuil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Acceuil
      </a>
      <a routerLink="/informations" routerLinkActive="active">Informations</a>
      <a routerLink="/auto-diagnostic" routerLinkActive="active">Auto-diagnostic</a>
    </div>
    <div class="app-nav__cta">
      @if (authService.authenticated()) {
        <button type="button" class="app-nav__button" (click)="logout()">
          Se deconnecter
        </button>
      } @else {
        <a routerLink="/connexion" routerLinkActive="active">Se connecter</a>
      }
    </div>
  </nav>
  <section class="app-content">
    <router-outlet />
  </section>
</main>
